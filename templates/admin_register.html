{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3>Admin Registration</h3>
    <form method="post" id="adminRegisterForm">
      <div class="mb-2">
        <input name="name" class="form-control" placeholder="Name (optional)">
      </div>
      <div class="mb-2">
        <input name="email" class="form-control" placeholder="Email" type="email" required id="admin_email">
        <small id="adminEmailHelp" class="form-text text-muted"></small>
      </div>
      <div class="mb-2">
        <input name="password" class="form-control" placeholder="Password" type="password" required id="admin_password">
        <small id="adminPasswordHelp" class="form-text text-muted">Password must be at least 6 characters</small>
      </div>
       <div class="alert alert-success mt-3">
         <small><i class="fas fa-check-circle"></i> Admin accounts are verified immediately.</small>
       </div>
       <button class="btn btn-primary" type="submit" id="adminSubmitBtn">Register as Admin</button>
    </form>
  </div>
</div>

<script>
// Admin registration form validation
document.getElementById('adminRegisterForm').addEventListener('submit', function(e) {
    const password = document.getElementById('admin_password').value;
    const email = document.getElementById('admin_email').value;

    // Password validation
    if (password.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters long');
        return;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        e.preventDefault();
        alert('Please enter a valid email address');
        return;
    }

    // Show loading state
    document.getElementById('adminSubmitBtn').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Registering...';
    document.getElementById('adminSubmitBtn').disabled = true;
});

// Real-time validation feedback
document.getElementById('admin_password').addEventListener('input', function() {
    const passwordHelp = document.getElementById('adminPasswordHelp');
    if (this.value.length < 6) {
        passwordHelp.style.color = 'red';
    } else {
        passwordHelp.style.color = 'green';
    }
});

document.getElementById('admin_email').addEventListener('input', function() {
    const emailHelp = document.getElementById('adminEmailHelp');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (this.value && !emailRegex.test(this.value)) {
        emailHelp.textContent = 'Invalid email format';
        emailHelp.style.color = 'red';
    } else {
        emailHelp.textContent = '';
    }
});
</script>
{% endblock %}
