{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3>Student Registration</h3>
    <form method="post" id="studentRegisterForm">
      <div class="mb-2">
        <input name="name" class="form-control" placeholder="Name" required id="student_name">
      </div>
      <div class="mb-2">
        <input name="email" class="form-control" placeholder="Email ID" type="email" required id="student_email">
        <small id="studentEmailHelp" class="form-text text-muted"></small>
      </div>
      <div class="mb-2">
        <input name="password" class="form-control" placeholder="Password" type="password" required id="student_password">
        <small id="studentPasswordHelp" class="form-text text-muted">Password must be at least 6 characters</small>
      </div>
      <div class="mb-2">
        <input name="cgpa" class="form-control" placeholder="CGPA (e.g., 8.5)" type="number" step="0.01" min="0" max="10" required id="student_cgpa">
      </div>
      <div class="mb-2">
        <textarea name="skills" class="form-control" placeholder="Skills (comma separated)" required id="student_skills"></textarea>
      </div>
      <div class="mb-2">
        <textarea name="resume" class="form-control" placeholder="Full resume text" rows="4" id="student_resume"></textarea>
      </div>
       <div class="alert alert-info mt-3">
         <small><i class="fas fa-info-circle"></i> Your registration will be reviewed by an administrator before you can access the system.</small>
       </div>
       <button class="btn btn-primary" type="submit" id="studentSubmitBtn">Register as Student</button>
    </form>
  </div>
</div>

<script>
// Student registration form validation
document.getElementById('studentRegisterForm').addEventListener('submit', function(e) {
    const password = document.getElementById('student_password').value;
    const email = document.getElementById('student_email').value;
    const cgpa = document.getElementById('student_cgpa').value;
    const skills = document.getElementById('student_skills').value;
    const name = document.getElementById('student_name').value;

    // Name validation
    if (!name.trim()) {
        e.preventDefault();
        alert('Name is required');
        return;
    }

    // Password validation
    if (password.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters long');
        return;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        e.preventDefault();
        alert('Please enter a valid email address');
        return;
    }

    // CGPA validation
    if (!cgpa || cgpa < 0 || cgpa > 10) {
        e.preventDefault();
        alert('CGPA must be between 0 and 10');
        return;
    }

    // Skills validation
    if (!skills.trim()) {
        e.preventDefault();
        alert('Skills are required');
        return;
    }

    // Show loading state
    document.getElementById('studentSubmitBtn').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Registering...';
    document.getElementById('studentSubmitBtn').disabled = true;
});

// Real-time validation feedback
document.getElementById('student_password').addEventListener('input', function() {
    const passwordHelp = document.getElementById('studentPasswordHelp');
    if (this.value.length < 6) {
        passwordHelp.style.color = 'red';
    } else {
        passwordHelp.style.color = 'green';
    }
});

document.getElementById('student_email').addEventListener('input', function() {
    const emailHelp = document.getElementById('studentEmailHelp');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (this.value && !emailRegex.test(this.value)) {
        emailHelp.textContent = 'Invalid email format';
        emailHelp.style.color = 'red';
    } else {
        emailHelp.textContent = '';
    }
});
</script>
{% endblock %}
